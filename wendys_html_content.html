gcdn.com/p/IqIuwfyfi12qOxK54MtSfQYHxfpxRFtNL8AMbSeNACk/1900x1068.jpg"/><div class="About-imageWrapper"><img class="About-image ObjectFit" src="//dynl.mktgcdn.com/p/IqIuwfyfi12qOxK54MtSfQYHxfpxRFtNL8AMbSeNACk/1900x1068.jpg" alt="Location Photo" loading="lazy"/></div><div class="About-info"><h2 class="About-title Heading--major">About Wendy's 226 Westview Plz</h2><div class="About-content"><div class="About-description"><div class="c-description"><div itemprop="description">At Wendy’s in McCook, NE, we got breakfast, lunch, and dinner. From fresh-cracked eggs to fresh, never-frozen beef, We Got You®.<br/><br/>Our square-pattied hamburgers always bring the freshness, our chicken sandwiches changed the game, and you know you love our nuggets. But we also got fresh-made salads, hot and crispy fries, even old-school chili and baked potatoes. You can start strong with one of our new breakfast sandwiches and a coffee drink, or satisfy your sweet tooth with a Frosty® or something from our bakery. From Kids’ Meals to meal deals, our menu is stacked with value. <br/><br/>So, stop by Wendy’s at 226 Westview Plz in McCook, NE. And don’t forget to download our app for restaurant info like hours, menu, nutrition, and exclusive deals. <br/><br/>Fresh beef available in the contiguous U.S., Alaska and Canada.</div></div></div><a class="About-button Button" href="https://www.wendys.com/" target="_blank" rel="nofollow noopener noreferrer" data-ya-track="corporatesite">wendys.com</a><div class="About-appLinks"><a class="About-appLink" href="https://m-wendys.app.link/web-locations-apple-store-button?~channel=https://locations.wendys.com/united-states/ne/mccook/226-westview-plz" data-ya-track="appleappstore"><img class="About-appIcon" src="../../../permanent-b0b701/assets/images/app-store.bee543a1.svg" alt="Apple App Store icon"/><span class="sr-only">Apple App Store link</span></a><a class="About-appLink" href="https://m-wendys.app.link/web-locations-google-play-store-button?~channel=https://locations.wendys.com/united-states/ne/mccook/226-westview-plz" data-ya-track="googleplay"><img class="About-appIcon" src="../../../permanent-b0b701/assets/images/google-play.2f2f4f70.svg" alt="Google Play icon"/><span class="sr-only">Google Play link</span></a></div></div></div></section><div class="Faq"><div class="Faq-container" itemscope="" itemtype="https://schema.org/FAQPage"><div class="Faq-title Heading--major">Frequently Asked Questions</div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Is Wendy’s delivery available near me?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">To find out if delivery is available near you, go to our app or <a href="https://www.wendys.com/delivery">wendys.com/delivery.</a></span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Is Wendy’s hiring in McCook, NE?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">To check if this Wendy’s location is currently hiring, visit our <a href="https://wendys-careers.com/job-search/">Careers page</a>, enter McCook, NE into the appropriate form fields and submit your search. If any jobs are currently available at this location or one nearby, they should appear within the results list.

If there are no open positions at your preferred restaurant at the time of your search, we recommend checking back often.</span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">How do I contact Wendy’s with questions or feedback about this location?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">Feedback about your experience with this Wendy’s location may be provided to our Customer Care team. To reach out through Live Chat or to leave a message, please visit our <a href="https://www.wendys.com/contact-us">Contact page</a>; use 888-624-8140 to call.

You may also provide feedback by filling out a <a href="https://www.wendyswantstoknow.com">Wendy’s Customer Satisfaction Survey</a>. You will need to refer to your receipt for the restaurant number, date and time of visit.

If you need to reach this location directly, please call (308) 920-8057.</span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Where can I buy Wendy’s gift cards?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">Wendy’s gift cards are available in-restaurant, through several brick &amp; mortar and online retailers and through our own online shop. To place an individual or bulk order online, please visit our <a href="http://www.wendysgiftcards.com/#/home">gift card portal.</a>

Already have a gift card? <a href="https://find.wendys.com/gift-card">Check your balance!</a></span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Where can I find menu pricing?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">Pricing may vary slightly depending on your location. To see menu prices for the Wendy’s of your choice, please visit <a href="https://order.wendys.com/">order.wendys.com.</a> or the mobile app. Once you’ve selected your location, prices should appear for each menu item.</span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Where can I find nutrition and allergen information?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">This information can be found on our <a href="https://order.wendys.com/categories?site=menu">menu website</a>, within our mobile app and in-restaurant. To access via our website or mobile app: Click through to a specific menu item and then select the blue “Nutrition &amp; Allergens” link found underneath the description and calorie count. If you are on the Wendy’s website or the mobile app, you’ll notice that the nutrition statistics will update as you customize your order.

A nutrition information poster is also located in each Wendy’s restaurant. A crew member will be happy to assist in directing you to it.</span></div></div><div class="Faq-section" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="Faq-question js-question"><div class="Faq-questionText" itemprop="name">Does Mccook Wendy’s serve breakfast?</div><img class="Faq-icon js-arrow" src="../../../permanent-b0b701/assets/images/chevron-red.854ffa3b.svg" alt=""/></div><div class="Faq-answer js-answer" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span itemprop="text">Yes, this Wendy’s location in McCook, NE serves breakfast! Go to <a href="https://order.wendys.com/">order.wendys.com.</a> or the mobile app, select this location, and choose from our selection of breakfast combos, croissant, biscuit and classic sandwiches, coffee and sides.</span></div></div></div></div></div></main><footer class="Footer" data-ya-scope="footer"><div class="Footer-main l-container"><div class="Footer-left"><ul class="Footer-mobileLinks"><li class="Footer-mobileLink"><a href="https://menu.wendys.com" class="Footer-link Link--footer" target="_blank" rel="nofollow noopener noreferrer" data-ya-track="link#" itemprop="sameAs">Food</a></li><li class="Footer-mobileLink"><a href="https://www.wendys.com/what-we-value" class="Footer-link Link--footer" target="_blank" rel="nofollow noopener noreferrer" data-ya-track="link#" itemprop="sameAs">Values</a></li><li class="Footer-mobileLink"><a href="https://www.wendys.com/who-we-are" class="Footer-link Link--footer" target="_blank" rel="nofollow noopener noreferrer" data-ya-track="link#" itemprop="sameAs">Company</a></li><li class="Footer-mobileLink"><a href="https://careers.wendys.com/" class="Footer-link Link--footer" target="_blank" rel="nofollow noopener noreferrer" data-ya-track="link#" itemprop="sameAs">Jobs</a></li></ul><ul class="Footer-mainLinks"><li class="Footer-mainLink"><a href="https:/
